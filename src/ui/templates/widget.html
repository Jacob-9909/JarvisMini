        const result = s.lastResult;
        const phase = s.phase;

        // ---- 왼쪽: 입력 / 결과(애니메이션) ----
        let mainHtml = "";
        if (phase === "idle" || !result) {
          const tagsHtml =
            s.menus.length === 0
              ? `<span class="placeholder" style="font-size:10px; color:var(--muted);">메뉴를 추가하세요.</span>`
              : s.menus
                  .map(
                    (m, i) => `
                <span class="lunch-tag">${escapeHtml(m)}
                  <button type="button" onclick="removeLunchMenu(${i})" title="삭제">×</button>
                </span>`
                  )
                  .join("");
          const dis = s.menus.length < 2 || s.drawing;
          const disAttr = dis ? "disabled" : "";
          mainHtml = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div class="method-badge">🎲 오늘은 어떻게?</div>
              <button class="lunch-reset-btn" onclick="resetLunchMenus()">기본 메뉴로</button>
            </div>
            <div class="lunch-tags" id="lunchTags">${tagsHtml}</div>
            <form class="lunch-add" onsubmit="addLunchMenu(event)">
              <input id="lunchMenuInput" type="text"
                placeholder="메뉴 입력 후 Enter (쉼표로 여러 개)" autocomplete="off" />
              <button type="submit">추가</button>
            </form>
            <button class="lunch-go" onclick="startLunchDraw()" ${disAttr}>
              ${s.drawing ? "추첨 중…" : "🎲 랜덤 방식으로 추첨"}
            </button>
            <div class="lunch-methods">
              <button type="button" onclick="startLunchDraw('lottery')" ${disAttr}>🎫 제비뽑기</button>
              <button type="button" onclick="startLunchDraw('ladder')" ${disAttr}>🪜 사다리타기</button>
              <button type="button" onclick="startLunchDraw('roulette')" ${disAttr}>🎡 룰렛</button>
            </div>
          `;
        } else {
          // 결과 스테이지 (drawing 진행 중이거나 done)
          const busy = s.drawing || phase !== "done";
          const busyAttr = busy ? "disabled" : "";
          mainHtml = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div class="method-badge">🎲 ${escapeHtml(

              )}</div>
              <button class="lunch-reset-btn" onclick="goLunchIdle()">✍ 메뉴/방식 바꾸기</button>

            <div class="lunch-stage" id="lunchStage">
              ${renderLunchStageSkeleton(result)}
            </div>
            <div class="lunch-winner" id="lunchWinner"
              style="${phase === "done" ? "" : "opacity:0.2;"}">
              ${phase === "done" ? "🍽 " + escapeHtml(result.winner) : "두근두근…"}
              <small>${phase === "done" ? "맛있게 드세요" : "고르는 중"}</small>
            </div>
            <div class="lunch-redraw">
              <button class="primary" onclick="startLunchDraw()" ${busyAttr}>🔁 같은 메뉴로 다시 뽑기</button>
              <div class="mini-methods">
                <button type="button" onclick="startLunchDraw('lottery')" ${busyAttr}>🎫</button>
                <button type="button" onclick="startLunchDraw('ladder')" ${busyAttr}>🪜</button>
                <button type="button" onclick="startLunchDraw('roulette')" ${busyAttr}>🎡</button>
              </div>
            </div>
          `;
        }

        // ---- 오른쪽: 기록 ----
        const hist = s.history || [];
        const historyHtml = hist.length
          ? `<ul>${hist
              .map(
                (h) => `
              <li title="${escapeHtml(h.method_label || "")} · ${escapeHtml(
                new Date(h.ts * 1000).toLocaleString()
              )}">
                <span class="m">🍱 ${escapeHtml(h.winner)}</span>
                <span class="meta">
                  <span>${escapeHtml(h.method_label || "")}</span>
                  <span>${escapeHtml(lunchAgo(h.ts))}</span>
                </span>
              </li>`
              )
              .join("")}</ul>`
          : `<div class="empty">아직 기록 없음</div>`;

        return `
          <div class="lunch-wrap">
            <div class="lunch-main">${mainHtml}</div>

              <h4>최근 기록</h4>
              ${historyHtml}
              ${
                hist.length
                  ? `<button class="lunch-reset-btn" style="align-self:flex-end;"
                      onclick="clearLunchHistory()">기록 지우기</button>`
                  : ""
              }

      }

      function renderLunchStageSkeleton(r) {
        if (!r) return "";
        const done = lunchState.phase === "done";
        if (r.method === "lottery") {
          return `<div class="lot-grid">${r.menus
            .map((m, i) => {
              let cls = "lot-card";
              if (done) cls += i === r.winner_idx ? " winner" : " revealed";
              return `
                <div class="${cls}" data-idx="${i}"
                  data-face="${escapeHtml(m)}">${escapeHtml(m)}</div>`;
            })
            .join("")}</div>`;
        }
        if (r.method === "ladder") {
          return `<canvas class="ladder-canvas" id="ladderCanvas" width="320" height="180"></canvas>`;
        }
        // roulette
        const finalStyle = done
          ? `style="transform: rotate(${r.meta?.final_angle ?? 0}deg); transition:none;"`
          : "";
        return `
          <div class="roulette-wrap">
            <div class="roulette-pointer"></div>
            <svg viewBox="-100 -100 200 200" class="roulette" id="rouletteSvg" ${finalStyle}>
              ${r.menus
                .map((m, i) => rouletteSector(i, r.menus.length, m))
                .join("")}
            </svg>
          </div>
        `;
      }

      function rouletteSector(i, n, label) {
        const seg = 360 / n;
        const start = (i * seg - 90) * (Math.PI / 180);
        const end = ((i + 1) * seg - 90) * (Math.PI / 180);
        const x1 = 100 * Math.cos(start);
        const y1 = 100 * Math.sin(start);
        const x2 = 100 * Math.cos(end);
        const y2 = 100 * Math.sin(end);
        const large = seg > 180 ? 1 : 0;
        const midAng = (i * seg + seg / 2 - 90) * (Math.PI / 180);
        const tx = 60 * Math.cos(midAng);
        const ty = 60 * Math.sin(midAng);
        const palette = [
          "#7aa2f7", "#bb9af7", "#7dcfff", "#9ece6a",
          "#e0af68", "#f7768e", "#73daca", "#c0caf5",
        ];
        const fill = palette[i % palette.length];
        return `
          <path d="M0 0 L ${x1} ${y1} A 100 100 0 ${large} 1 ${x2} ${y2} Z"
            fill="${fill}" stroke="#0c0e17" stroke-width="1"/>
          <text x="${tx}" y="${ty}" fill="#0a0c14" font-size="9"
            text-anchor="middle" dominant-baseline="middle"
            transform="rotate(${i * seg + seg / 2} ${tx} ${ty})">
            ${escapeHtml(String(label).slice(0, 5))}
          </text>`;
      }

      function playDrawAnimation(r) {
        if (!r) return;
        lunchState.phase = "drawing";
        if (r.method === "roulette") animateRoulette(r);
        else if (r.method === "ladder") animateLadder(r);
        else animateLottery(r);
      }

      function animateRoulette(r) {
        const el = document.getElementById("rouletteSvg");
        if (!el) return finalizeDraw(2800);
        const ang = r.meta?.final_angle ?? 1440;
        const dur = r.meta?.duration_ms ?? 2600;
        el.style.setProperty("--dur", dur + "ms");
        el.style.transform = "rotate(0deg)";
        void el.offsetWidth;
        requestAnimationFrame(() => {
          el.style.transform = `rotate(${ang}deg)`;
        });
        finalizeDraw(dur + 250);
      }

      function animateLottery(r) {
        const stage = document.getElementById("lunchStage");
        if (!stage) return finalizeDraw(2400);
        const cards = stage.querySelectorAll(".lot-card");
        const order = r.meta?.reveal_order || r.menus.map((_, i) => i);
        const winnerIdx = r.winner_idx;
        const total = order.length;
        order.forEach((idx, step) => {
          setTimeout(() => {
            const c = cards[idx];
            if (!c) return;
            if (idx === winnerIdx && step === total - 1) {
              c.classList.add("winner");
            } else {
              c.classList.add("revealed");
            }
          }, 140 * (step + 1));
        });
        finalizeDraw(140 * (total + 2));
      }

      function animateLadder(r) {
        const cv = document.getElementById("ladderCanvas");
        if (!cv) return finalizeDraw(2400);
        const ctx = cv.getContext("2d");
        const w = cv.width, h = cv.height;
        const n = r.menus.length;
        const pad = 18;
        const colW = (w - pad * 2) / (n - 1);
        const legs = r.meta?.legs || [];
        const levels = r.meta?.levels || legs.length;
        const startIdx = r.meta?.start_idx ?? r.winner_idx;
        const topY = pad;
        const bottomY = h - pad - 14;
        const rowH = (bottomY - topY) / levels;

        ctx.clearRect(0, 0, w, h);
        ctx.font = "9px system-ui";
        ctx.fillStyle = "#7c829a";
        ctx.textAlign = "center";
        // 열 라벨
        for (let i = 0; i < n; i++) {
          ctx.fillText(r.menus[i].slice(0, 4), pad + i * colW, h - 2);
        }
        ctx.strokeStyle = "#2a2e44";
        ctx.lineWidth = 1;
        // 세로선
        for (let i = 0; i < n; i++) {
          ctx.beginPath();
          ctx.moveTo(pad + i * colW, topY);
          ctx.lineTo(pad + i * colW, bottomY);
          ctx.stroke();
        }
        // 가로선
        legs.forEach((layer, li) => {
          const y = topY + rowH * (li + 0.5);
          layer.forEach((c) => {
            ctx.beginPath();
            ctx.moveTo(pad + c * colW, y);
            ctx.lineTo(pad + (c + 1) * colW, y);
            ctx.stroke();
          });
        });

        // 경로 애니메이션
        ctx.strokeStyle = "#7aa2f7";
        ctx.lineWidth = 2.2;
        ctx.lineCap = "round";
        let curCol = startIdx;
        let curY = topY;
        let li = 0;
        const step = () => {
          if (li >= legs.length) {
            // 마지막 세로선 내려가 끝
            ctx.beginPath();
            ctx.moveTo(pad + curCol * colW, curY);
            ctx.lineTo(pad + curCol * colW, bottomY);
            ctx.stroke();
            return finalizeDraw(300);
          }
          const y = topY + rowH * (li + 0.5);
          // 세로로 y 까지 내려가기
          ctx.beginPath();
          ctx.moveTo(pad + curCol * colW, curY);
          ctx.lineTo(pad + curCol * colW, y);
          ctx.stroke();
          curY = y;
          const layer = legs[li];
          if (layer.includes(curCol)) {
            // 오른쪽 이동
            ctx.beginPath();
            ctx.moveTo(pad + curCol * colW, y);
            ctx.lineTo(pad + (curCol + 1) * colW, y);
            ctx.stroke();
            curCol += 1;
          } else if (layer.includes(curCol - 1)) {
            ctx.beginPath();
            ctx.moveTo(pad + curCol * colW, y);
            ctx.lineTo(pad + (curCol - 1) * colW, y);
            ctx.stroke();
            curCol -= 1;
          }
          li += 1;
          setTimeout(step, 180);
        };
        step();
      }

      function drawLadderFinal(r) {
        // animateLadder 의 step 로직을 즉시 전체 경로로 재현
        const cv = document.getElementById("ladderCanvas");
        if (!cv) return;
        const ctx = cv.getContext("2d");
        const w = cv.width, h = cv.height;
        const n = r.menus.length;
        const pad = 18;
        const colW = (w - pad * 2) / (n - 1);
        const legs = r.meta?.legs || [];
        const levels = r.meta?.levels || legs.length;
        const startIdx = r.meta?.start_idx ?? r.winner_idx;
        const topY = pad;
        const bottomY = h - pad - 14;
        const rowH = (bottomY - topY) / levels;
        ctx.clearRect(0, 0, w, h);
        ctx.font = "9px system-ui";
        ctx.fillStyle = "#7c829a";
        ctx.textAlign = "center";
        for (let i = 0; i < n; i++) {
          ctx.fillText(r.menus[i].slice(0, 4), pad + i * colW, h - 2);
        }
        ctx.strokeStyle = "#2a2e44";
        ctx.lineWidth = 1;
        for (let i = 0; i < n; i++) {
          ctx.beginPath();
          ctx.moveTo(pad + i * colW, topY);
          ctx.lineTo(pad + i * colW, bottomY);
          ctx.stroke();
        }
        legs.forEach((layer, li) => {
          const y = topY + rowH * (li + 0.5);
          layer.forEach((c) => {
            ctx.beginPath();
            ctx.moveTo(pad + c * colW, y);
            ctx.lineTo(pad + (c + 1) * colW, y);
            ctx.stroke();
          });
        });
        ctx.strokeStyle = "#7aa2f7";
        ctx.lineWidth = 2.2;
        let curCol = startIdx;
        let curY = topY;
        legs.forEach((layer, li) => {
          const y = topY + rowH * (li + 0.5);
          ctx.beginPath();
          ctx.moveTo(pad + curCol * colW, curY);
          ctx.lineTo(pad + curCol * colW, y);
          ctx.stroke();
          curY = y;
          if (layer.includes(curCol)) {
            ctx.beginPath();
            ctx.moveTo(pad + curCol * colW, y);
            ctx.lineTo(pad + (curCol + 1) * colW, y);
            ctx.stroke();
            curCol += 1;
          } else if (layer.includes(curCol - 1)) {
            ctx.beginPath();
            ctx.moveTo(pad + curCol * colW, y);
            ctx.lineTo(pad + (curCol - 1) * colW, y);
            ctx.stroke();
            curCol -= 1;
          }
        });
        ctx.beginPath();
        ctx.moveTo(pad + curCol * colW, curY);
        ctx.lineTo(pad + curCol * colW, bottomY);
        ctx.stroke();
      }

      function finalizeDraw(ms) {
        setTimeout(() => {
          lunchState.phase = "done";
          renderPaneFromCache();
          fetchLunchHistory(); // 확정된 기록을 서버와도 동기화
        }, ms);
      }

      function addLunchMenu(ev) {
        ev.preventDefault();
        const inp = document.getElementById("lunchMenuInput");
        const raw = (inp?.value || "").trim();
        if (!raw) return;
        const parts = raw
          .split(",")
          .map((t) => t.trim())
          .filter(Boolean);
        const merged = new Set(lunchState.menus);
        parts.forEach((p) => {
          if (p.length > 24) p = p.slice(0, 24);
          if (merged.size < 20) merged.add(p);
        });
        lunchState.menus = [...merged];
        if (inp) inp.value = "";
        renderPaneFromCache();
        document.getElementById("lunchMenuInput")?.focus();
      }

      function removeLunchMenu(i) {
        lunchState.menus.splice(i, 1);
        renderPaneFromCache();
      }

      function resetLunchMenus() {
        lunchState.menus = [...DEFAULT_LUNCH_MENUS];
        renderPaneFromCache();
      }

      async function startLunchDraw(method) {
        if (lunchState.drawing) return;
        if (lunchState.menus.length < 2) {
          toast("메뉴를 2개 이상 추가해 주세요");
          return;
        }
        lunchState.drawing = true;
        // 결과 화면에서 재추첨하는 경우: 바로 drawing 상태로 전환해
        // 이전 winner 가 '확정 결과'처럼 보이는 걸 방지
        if (lunchState.lastResult) {
          lunchState.phase = "drawing";
        }
        renderPaneFromCache();
        try {
          const payload = { menus: lunchState.menus };
          if (method) payload.method = method;
          await runAction("lunch_roulette", payload);
        } finally {
          lunchState.drawing = false;
        }
      }

      function goLunchIdle() {
        lunchState.phase = "idle";
        lunchState.lastResult = null;
        // 캐시된 이전 응답도 비워 렌더러가 재주입하지 않게
        if (paneCache.lunch_roulette?.out?.dashboard?.data) {
          paneCache.lunch_roulette.out.dashboard.data = { __idle: true };
        }
        renderPaneFromCache();
      }

      async function fetchLunchHistory() {
        try {
          const r = await fetch(`/api/lunch/history?user_id=${USER_ID}`);
          if (!r.ok) return;
          const data = await r.json();
          lunchState.history = data.items || [];
          if (activeAction === "lunch_roulette") renderPaneFromCache();
        } catch {}
      }

      async function clearLunchHistory() {
        try {
          await fetch(`/api/lunch/history?user_id=${USER_ID}`, {
            method: "DELETE",
          });
          lunchState.history = [];
          // 캐시된 dashboard.data.history 도 함께 비워서 재렌더 시 복원되지 않게
          const cached = paneCache.lunch_roulette?.out?.dashboard?.data;
          if (cached) cached.history = [];
          if (lunchState.lastResult) lunchState.lastResult.history = [];
          renderPaneFromCache();
          toast("기록을 지웠어요");
        } catch {
          toast("기록 삭제 실패");
        }
      }

      function lunchAgo(ts) {
        if (!ts) return "";
        const diff = (Date.now() / 1000) - ts;
        if (diff < 60) return "방금";
        if (diff < 3600) return `${Math.round(diff / 60)}분 전`;
        if (diff < 86400) return `${Math.round(diff / 3600)}시간 전`;
        return `${Math.round(diff / 86400)}일 전`;
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>\"']/g, (m) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[m]));
      }

      document.querySelectorAll(".actions button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          const isSame = activeAction === action;

          if (action === "status") {
            setActiveButton("status");
            fetchState().then(() => renderPaneFromCache());
            return;
          }

          // 점심 탭: 추첨을 자동 실행하지 않고 입력 화면 노출
          if (action === "lunch_roulette") {
            setActiveButton("lunch_roulette");
            if (!paneCache.lunch_roulette || isSame) {
              // 캐시가 있으면 그대로, 없거나 같은 탭 재클릭이면 입력 화면으로
              if (isSame) goLunchIdle();
              paneCache.lunch_roulette = {
                kind: "rich",
                out: {
                  dashboard: { data: lunchState.lastResult || { __idle: true } },
                },
              };
            }
            renderPaneFromCache();
            fetchLunchHistory();
            return;
          }

          if (isSame) {
            runAction(action);
            return;
          }

          if (paneCache[action]) {
            setActiveButton(action);
            renderPaneFromCache();
            return;
          }

          runAction(action);
        });
      });

      const KEY_MAP = {
        s: "status", b: "bus", c: "cafe", l: "lunch_roulette",
        g: "calendar", p: "pet_chat",
      };
      window.addEventListener("keydown", (e) => {
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        if (!stateReady) return;
        const ov = $("profileOverlay");
        if (ov && !ov.classList.contains("hidden")) {
          if (KEY_MAP[e.key.toLowerCase()]) e.preventDefault();
          return;
        }
        const a = KEY_MAP[e.key.toLowerCase()];
        if (a) {
          e.preventDefault();
          document.querySelector(`[data-action="${a}"]`)?.click();
        }
      });

      fetchState().then(() => {
        setActiveButton("status");
        renderPaneFromCache();
      });
      setInterval(fetchState, 3000);
    </script>
  </body>
</html>
